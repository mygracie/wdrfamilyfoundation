<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Weather Dashboard</title>
    <link rel="stylesheet" href="styles.css">
</head>
<body>
    <div class="container">
        <header>
            <h1>🌤️ Weather Dashboard</h1>
            <p>Real-time Weather Information</p>
        </header>

        <div class="search-section">
            <input 
                type="text" 
                id="cityInput" 
                placeholder="Enter city name..." 
                class="search-box"
            >
            <button id="searchBtn" class="search-btn">Search</button>
            <button id="locationBtn" class="location-btn">📍 Use My Location</button>
        </div>

        <div id="error" class="error-message"></div>

        <div id="weatherContainer" class="weather-container hidden">
            <div class="current-weather">
                <div class="city-info">
                    <h2 id="cityName"></h2>
                    <p id="date"></p>
                </div>
                
                <div class="weather-main">
                    <img id="weatherIcon" src="" alt="weather icon" class="weather-icon">
                    <div class="temperature-section">
                        <span id="temperature" class="temperature"></span>
                        <span class="celsius">°C</span>
                    </div>
                </div>

                <p id="description" class="description"></p>
            </div>

            <div class="weather-details">
                <div class="detail-card">
                    <h3>Feels Like</h3>
                    <p id="feelsLike"></p>
                </div>
                <div class="detail-card">
                    <h3>Humidity</h3>
                    <p id="humidity"></p>
                </div>
                <div class="detail-card">
                    <h3>Wind Speed</h3>
                    <p id="windSpeed"></p>
                </div>
                <div class="detail-card">
                    <h3>Pressure</h3>
                    <p id="pressure"></p>
                </div>
                <div class="detail-card">
                    <h3>Visibility</h3>
                    <p id="visibility"></p>
                </div>
                <div class="detail-card">
                    <h3>UV Index</h3>
                    <p id="uvIndex"></p>
                </div>
            </div>

            <div class="forecast-section">
                <h3>5-Day Forecast</h3>
                <div id="forecastContainer" class="forecast-container"></div>
            </div>
        </div>

        <footer>
            <p>Data provided by OpenWeatherMap API</p>
            <p>© 2026 Weather Dashboard. All rights reserved.</p>
        </footer>
    </div>

    <script src="script.js"></script>
</body>
</html>
